AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Capstone Snippets - serverless code snippet API with Cognito, Lambda, DynamoDB, S3, SNS, X-Ray and dashboard.

Parameters:
  EnableCanaryDeploy:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to true after the first successful deployment to enable SAM/CodeDeploy canary traffic shifting.

Conditions:
  CanaryDeployEnabled: !Equals [!Ref EnableCanaryDeploy, 'true']

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - arm64
    Timeout: 10
    MemorySize: 512
    Tracing: Active
    Environment:
      Variables:
        POWERTOOLS_LOG_LEVEL: INFO
        POWERTOOLS_METRICS_NAMESPACE: CapstoneSnippets

Resources:
  SnippetsKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: CMK used for Snippets S3 bucket encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootAccountPermissions
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: '*'

  SnippetsKmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub alias/${AWS::StackName}-snippets
      TargetKeyId: !Ref SnippetsKmsKey

  SnippetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt SnippetsKmsKey.Arn
            BucketKeyEnabled: true

  SnippetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SnippetsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonTLSRequests
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt SnippetsBucket.Arn
              - !Sub ${SnippetsBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: false

  SnippetsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  SnippetEventsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${AWS::StackName}-new-snippet

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${AWS::StackName}-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${AWS::StackName}-client
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/${AWS::StackName}-httpapi
      RetentionInDays: 30

  SnippetsHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Auth:
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
              audience:
                - !Ref UserPoolClient
        DefaultAuthorizer: CognitoJwtAuthorizer
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.routeKey","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength","integrationError":"$context.integrationErrorMessage"}'
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowHeaders:
          - Authorization
          - Content-Type
        AllowMethods:
          - GET
          - POST
          - DELETE
          - OPTIONS

  ApiFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Roll back API Lambda canary deployment if function errors occur.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Sub ${AWS::StackName}-api
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  CounterFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Roll back counter Lambda canary deployment if function errors occur.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Sub ${AWS::StackName}-counter
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-api
      CodeUri: src/api/
      Handler: app.lambda_handler
      AutoPublishAlias: live
      DeploymentPreference:
        Enabled: !If [CanaryDeployEnabled, true, false]
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref ApiFunctionErrorAlarm
      Environment:
        Variables:
          TABLE_NAME: !Ref SnippetsTable
          BUCKET_NAME: !Ref SnippetsBucket
          TOPIC_ARN: !Ref SnippetEventsTopic
          POWERTOOLS_SERVICE_NAME: snippets-api
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSXRayDaemonWriteAccess
        - Version: '2012-10-17'
          Statement:
            - Sid: DynamoDbSnippetAccess
              Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:DeleteItem
                - dynamodb:Query
              Resource:
                - !GetAtt SnippetsTable.Arn
                - !Sub ${SnippetsTable.Arn}/index/GSI1
            - Sid: S3SnippetObjectAccess
              Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:DeleteObject
              Resource: !Sub ${SnippetsBucket.Arn}/snippets/*
            - Sid: PublishNewSnippetEvents
              Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref SnippetEventsTopic
            - Sid: UseSnippetsKmsKey
              Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
                - kms:GenerateDataKey
              Resource: !GetAtt SnippetsKmsKey.Arn
      Events:
        PostSnippet:
          Type: HttpApi
          Properties:
            ApiId: !Ref SnippetsHttpApi
            Path: /snippets
            Method: POST
            PayloadFormatVersion: '2.0'
        ListSnippets:
          Type: HttpApi
          Properties:
            ApiId: !Ref SnippetsHttpApi
            Path: /snippets
            Method: GET
            PayloadFormatVersion: '2.0'
        GetSnippet:
          Type: HttpApi
          Properties:
            ApiId: !Ref SnippetsHttpApi
            Path: /snippets/{id}
            Method: GET
            PayloadFormatVersion: '2.0'
        DeleteSnippet:
          Type: HttpApi
          Properties:
            ApiId: !Ref SnippetsHttpApi
            Path: /snippets/{id}
            Method: DELETE
            PayloadFormatVersion: '2.0'

  CounterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-counter
      CodeUri: src/counter/
      Handler: app.lambda_handler
      AutoPublishAlias: live
      DeploymentPreference:
        Enabled: !If [CanaryDeployEnabled, true, false]
        Type: Canary10Percent5Minutes
        Alarms:
          - !Ref CounterFunctionErrorAlarm
      Environment:
        Variables:
          TABLE_NAME: !Ref SnippetsTable
          POWERTOOLS_SERVICE_NAME: snippets-counter
      Policies:
        - AWSLambdaBasicExecutionRole
        - AWSXRayDaemonWriteAccess
        - Version: '2012-10-17'
          Statement:
            - Sid: DynamoDbCounterAccess
              Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !GetAtt SnippetsTable.Arn
      Events:
        NewSnippetEvent:
          Type: SNS
          Properties:
            Topic: !Ref SnippetEventsTopic

  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-api
      RetentionInDays: 30

  CounterFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-counter
      RetentionInDays: 30

  CapstoneDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: capstone-snippets
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "HTTP API Count / 4xx / 5xx",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "AWS/ApiGateway", "Count", "ApiId", "${SnippetsHttpApi}", "Stage", "$default" ],
                  [ ".", "4xx", ".", ".", ".", "." ],
                  [ ".", "5xx", ".", ".", ".", "." ]
                ],
                "stat": "Sum",
                "period": 60
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "HTTP API Latency p95",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "AWS/ApiGateway", "Latency", "ApiId", "${SnippetsHttpApi}", "Stage", "$default" ]
                ],
                "stat": "p95",
                "period": 60
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Lambda Errors / Throttles / Duration",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "AWS/Lambda", "Errors", "FunctionName", "${AWS::StackName}-api" ],
                  [ ".", "Throttles", ".", "." ],
                  [ ".", "Duration", ".", ".", { "stat": "p95", "yAxis": "right" } ],
                  [ "AWS/Lambda", "Errors", "FunctionName", "${AWS::StackName}-counter" ],
                  [ ".", "Throttles", ".", "." ],
                  [ ".", "Duration", ".", ".", { "stat": "p95", "yAxis": "right" } ]
                ],
                "stat": "Sum",
                "period": 60
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "DynamoDB Capacity / Throttles",
                "region": "${AWS::Region}",
                "metrics": [
                  [ "AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${SnippetsTable}" ],
                  [ ".", "ConsumedWriteCapacityUnits", ".", "." ],
                  [ ".", "ThrottledRequests", ".", "." ]
                ],
                "stat": "Sum",
                "period": 60
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 12,
              "width": 24,
              "height": 6,
              "properties": {
                "title": "Last 20 Lambda ERROR logs",
                "region": "${AWS::Region}",
                "query": "SOURCE '/aws/lambda/${AWS::StackName}-api' | SOURCE '/aws/lambda/${AWS::StackName}-counter' | fields @timestamp, @message | filter @message like /ERROR|Exception|Traceback/ | sort @timestamp desc | limit 20"
              }
            }
          ]
        }

Outputs:
  ApiUrl:
    Description: HTTP API invoke URL
    Value: !Sub https://${SnippetsHttpApi}.execute-api.${AWS::Region}.amazonaws.com
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito App Client ID
    Value: !Ref UserPoolClient
  SnippetsTableName:
    Description: DynamoDB table name
    Value: !Ref SnippetsTable
  SnippetsBucketName:
    Description: S3 bucket name
    Value: !Ref SnippetsBucket
  NewSnippetTopicArn:
    Description: SNS topic for new-snippet events
    Value: !Ref SnippetEventsTopic
